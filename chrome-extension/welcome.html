<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TextLens - Welcome</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-glow {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
    }

    .bg-glow-1 {
      top: -100px;
      right: -100px;
      background: #3b82f6;
    }

    .bg-glow-2 {
      bottom: -100px;
      left: -100px;
      background: #10b981;
    }

    .container {
      max-width: 480px;
      width: 100%;
      padding: 40px 32px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .logo-wrapper {
      width: 80px;
      height: 80px;
      margin: 0 auto 28px;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .logo-wrapper svg {
      width: 40px;
      height: 40px;
      color: white;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #f1f5f9, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .features {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 36px;
      text-align: left;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(51, 65, 85, 0.5);
      border-radius: 12px;
      transition: all 0.2s ease;
    }

    .feature:hover {
      background: rgba(30, 41, 59, 0.9);
      border-color: rgba(59, 130, 246, 0.3);
      transform: translateX(4px);
    }

    .feature-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .feature-icon.blue { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
    .feature-icon.green { background: rgba(16, 185, 129, 0.15); color: #34d399; }
    .feature-icon.amber { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }

    .feature-icon svg { width: 18px; height: 18px; }

    .feature-text {
      font-size: 13px;
      color: #cbd5e1;
      line-height: 1.4;
    }

    .feature-text strong {
      color: #f1f5f9;
      font-weight: 600;
    }

    .formats {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .format-badge {
      padding: 6px 14px;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(51, 65, 85, 0.6);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: 0.5px;
    }

    .start-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.3);
    }

    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
    }

    .start-btn:active {
      transform: translateY(0);
    }

    .start-btn svg { width: 18px; height: 18px; }

    .version {
      margin-top: 24px;
      font-size: 11px;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="container">
    <div class="logo-wrapper">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="9" y1="13" x2="15" y2="13"/>
        <line x1="9" y1="17" x2="13" y2="17"/>
      </svg>
    </div>

    <h1>TextLens</h1>
    <p class="subtitle">Extract text from any image with powerful OCR technology. Fast, accurate, and private.</p>

    <div class="features">
      <div class="feature">
        <div class="feature-icon blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <div class="feature-text"><strong>Upload images</strong> to extract text instantly</div>
      </div>
      <div class="feature">
        <div class="feature-icon green">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </div>
        <div class="feature-text"><strong>Copy to clipboard</strong> or download as TXT</div>
      </div>
      <div class="feature">
        <div class="feature-icon amber">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <div class="feature-text"><strong>100% private</strong> - all processing happens locally</div>
      </div>
    </div>

    <div class="formats">
      <span class="format-badge">JPG</span>
      <span class="format-badge">JPEG</span>
      <span class="format-badge">PNG</span>
      <span class="format-badge">WEBP</span>
    </div>

    <button class="start-btn" id="startBtn">
      Get Started
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>

    <p class="version">v1.0.0</p>
  </div>

  <script src="welcome.js"></script>
</body>
</html>
