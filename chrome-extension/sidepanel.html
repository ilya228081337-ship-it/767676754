<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TextLens - OCR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --border: rgba(51, 65, 85, 0.6);
      --border-hover: rgba(59, 130, 246, 0.4);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --blue: #3b82f6;
      --blue-hover: #2563eb;
      --green: #10b981;
      --green-hover: #059669;
      --amber: #f59e0b;
      --red: #ef4444;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--blue), var(--green));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-logo svg { width: 18px; height: 18px; color: white; }

    .header-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-reset {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: none;
    }

    .header-reset:hover {
      border-color: var(--border-hover);
      color: var(--text-primary);
    }

    .header-reset.visible { display: block; }

    /* Main content */
    .main {
      padding: 20px;
    }

    /* Upload area */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(30, 41, 59, 0.3);
      position: relative;
    }

    .upload-area:hover,
    .upload-area.dragover {
      border-color: var(--blue);
      background: rgba(59, 130, 246, 0.05);
    }

    .upload-area.dragover {
      transform: scale(1.01);
    }

    .upload-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      background: rgba(59, 130, 246, 0.1);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .upload-area:hover .upload-icon {
      background: rgba(59, 130, 246, 0.2);
      transform: translateY(-2px);
    }

    .upload-icon svg { width: 24px; height: 24px; color: var(--blue); }

    .upload-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .upload-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .upload-btn:hover {
      background: var(--blue-hover);
      transform: translateY(-1px);
    }

    .upload-btn svg { width: 16px; height: 16px; }

    .upload-formats {
      margin-top: 16px;
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .upload-format {
      padding: 3px 10px;
      background: rgba(51, 65, 85, 0.4);
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    #fileInput { display: none; }

    /* Image preview */
    .preview-section {
      display: none;
      margin-top: 20px;
    }

    .preview-section.visible { display: block; }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .preview-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .preview-filename {
      font-size: 12px;
      color: var(--text-muted);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .preview-container {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      max-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview-container img {
      max-width: 100%;
      max-height: 200px;
      object-fit: contain;
    }

    /* Process button */
    .process-btn {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      background: linear-gradient(135deg, var(--blue), var(--green));
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .process-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .process-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .process-btn svg { width: 18px; height: 18px; }

    /* Progress */
    .progress-section {
      display: none;
      margin-top: 20px;
    }

    .progress-section.visible { display: block; }

    .progress-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .progress-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .progress-percent {
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
    }

    .progress-bar {
      height: 6px;
      background: var(--bg-tertiary);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--green));
      border-radius: 3px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .progress-status {
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Result section */
    .result-section {
      display: none;
      margin-top: 20px;
    }

    .result-section.visible { display: block; }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .result-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .result-actions {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn:hover {
      border-color: var(--border-hover);
      color: var(--text-primary);
      background: rgba(59, 130, 246, 0.1);
    }

    .action-btn.copied {
      border-color: var(--green);
      color: var(--green);
      background: rgba(16, 185, 129, 0.1);
    }

    .action-btn svg { width: 14px; height: 14px; }

    .result-textarea {
      width: 100%;
      min-height: 180px;
      max-height: 400px;
      padding: 14px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    .result-textarea:focus {
      border-color: var(--blue);
    }

    .result-stats {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      padding: 10px 14px;
      background: rgba(30, 41, 59, 0.5);
      border-radius: 8px;
    }

    .stat {
      font-size: 11px;
      color: var(--text-muted);
    }

    .stat span {
      color: var(--text-secondary);
      font-weight: 600;
    }

    /* Error */
    .error-section {
      display: none;
      margin-top: 20px;
    }

    .error-section.visible { display: block; }

    .error-box {
      padding: 14px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .error-box svg { width: 18px; height: 18px; color: var(--red); flex-shrink: 0; margin-top: 1px; }

    .error-text {
      font-size: 13px;
      color: #fca5a5;
      line-height: 1.5;
    }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="header-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="9" y1="13" x2="15" y2="13"/>
          <line x1="9" y1="17" x2="13" y2="17"/>
        </svg>
      </div>
      <span class="header-title">TextLens</span>
    </div>
    <button class="header-reset" id="resetBtn">
      New Scan
    </button>
  </div>

  <div class="main">
    <!-- Upload Area -->
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
      <div class="upload-title">Drop your image here</div>
      <div class="upload-subtitle">or click to browse files</div>
      <button class="upload-btn" id="browseBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Choose File
      </button>
      <div class="upload-formats">
        <span class="upload-format">JPG</span>
        <span class="upload-format">JPEG</span>
        <span class="upload-format">PNG</span>
        <span class="upload-format">WEBP</span>
      </div>
      <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.webp" />
    </div>

    <!-- Image Preview -->
    <div class="preview-section" id="previewSection">
      <div class="preview-header">
        <span class="preview-label">Selected Image</span>
        <span class="preview-filename" id="fileName"></span>
      </div>
      <div class="preview-container">
        <img id="previewImg" alt="Preview" />
      </div>
      <button class="process-btn" id="processBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 7 4 4 20 4 20 7"/>
          <line x1="9" y1="20" x2="15" y2="20"/>
          <line x1="12" y1="4" x2="12" y2="20"/>
        </svg>
        Extract Text
      </button>
    </div>

    <!-- Progress -->
    <div class="progress-section" id="progressSection">
      <div class="progress-header">
        <span class="progress-label">Processing</span>
        <span class="progress-percent" id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-status" id="progressStatus">Initializing OCR engine...</div>
    </div>

    <!-- Error -->
    <div class="error-section" id="errorSection">
      <div class="error-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <span class="error-text" id="errorText"></span>
      </div>
    </div>

    <!-- Result -->
    <div class="result-section" id="resultSection">
      <div class="result-header">
        <span class="result-label">Extracted Text</span>
        <div class="result-actions">
          <button class="action-btn" id="copyBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copy
          </button>
          <button class="action-btn" id="downloadBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download
          </button>
        </div>
      </div>
      <textarea class="result-textarea" id="resultText" readonly></textarea>
      <div class="result-stats">
        <div class="stat">Characters: <span id="charCount">0</span></div>
        <div class="stat">Words: <span id="wordCount">0</span></div>
        <div class="stat">Lines: <span id="lineCount">0</span></div>
      </div>
    </div>
  </div>

  <script src="tesseract.min.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
